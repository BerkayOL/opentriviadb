name: opentriviadb
description: A clean Flutter trivia quiz starter built with Open Trivia DB, Cubit, Dio, Hive, and feature-first architecture.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.0
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  get_it: ^9.2.0
  go_router: ^17.0.1
  hive_ce: ^2.15.1
  hive_ce_flutter: ^2.3.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
flutter:
  uses-material-design: true
  assets:
    - assets/images/logo/quizora_foreground.png
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
    - family: Antonio
      fonts:
        - asset: assets/fonts/Anton-Regular.ttf
          weight: 400
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo/quizora_foreground.png
  adaptive_icon_foreground: assets/images/logo/quizora_foreground.png
  adaptive_icon_background: "#120D3F"
