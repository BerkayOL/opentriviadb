name: opentriviadb
description: A clean Flutter trivia quiz starter built with Open Trivia DB, Cubit, Dio, Hive, and feature-first architecture.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.0
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  get_it: ^9.2.0
  go_router: ^17.0.1
  hive_ce: ^2.15.1
  hive_ce_flutter: ^2.3.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
